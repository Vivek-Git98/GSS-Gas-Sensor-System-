# =============================================================
#  Telegraf Configuration — GSS Pipeline
#  MQTT (Mosquitto) → InfluxDB v2
# =============================================================

[global_tags]
  project = "gas_sensor_system"

[agent]
  interval          = "10s"
  round_interval    = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval    = "10s"
  flush_jitter      = "0s"
  precision         = ""
  hostname          = ""
  omit_hostname     = false

# -------------------------------------------------------------
#  INPUT: MQTT Consumer
#  Subscribes to Mosquitto and reads InfluxDB line-protocol
# -------------------------------------------------------------
[[inputs.mqtt_consumer]]
  ## Mosquitto broker address
  servers = ["tcp://localhost:1883"]

  ## Topics to subscribe to
  topics  = ["gas_sensors/lab"]

  ## MQTT QoS: 0 = at-most-once, 1 = at-least-once, 2 = exactly-once
  qos = 0

  ## Client ID (must be unique per connected client)
  client_id = "telegraf_gss"

  ## Credentials (leave empty if Mosquitto runs without auth)
  # username = ""
  # password = ""

  ## Data format — InfluxDB line protocol published by ESP32
  data_format = "influx"

# -------------------------------------------------------------
#  OUTPUT: InfluxDB v2
# -------------------------------------------------------------
[[outputs.influxdb_v2]]
  ## InfluxDB URL
  urls = ["http://localhost:8086"]

  ## Authentication token generated in InfluxDB UI
  token = "YOUR_INFLUXDB_TOKEN_HERE"

  ## Organisation and bucket
  organization = "your_org"
  bucket       = "gas_data"

  ## Timeout for HTTP requests
  timeout = "5s"
